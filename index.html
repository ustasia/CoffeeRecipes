<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1C1714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Brew Spec · Coffee Recipes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#1C1714;--surface:#26201B;--raised:#322A22;--raised2:#3C332A;
    --ink:#F1EADF;--muted:#A99A8A;--faint:#6E6055;
    --line:rgba(241,234,223,.10);--line-strong:rgba(241,234,223,.18);
    --amber:#E6A24C;--copper:#D07B43;--teal:#5FB6A8;--danger:#E0745F;
    --accent:var(--amber);
    --mono:"Space Mono",ui-monospace,monospace;
    --disp:"Space Grotesk","Pretendard",sans-serif;
    --body:"Pretendard","Space Grotesk",-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.55;
    -webkit-font-smoothing:antialiased;min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 72px}
  button{font-family:inherit;cursor:pointer}

  header{padding:26px 0 6px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
  .brand{font-family:var(--mono);font-size:11px;letter-spacing:.32em;color:var(--muted);text-transform:uppercase}
  h1{font-family:var(--disp);font-weight:700;font-size:28px;letter-spacing:-.01em;line-height:1.05;margin-top:6px}
  .mark{width:44px;height:44px;display:block;flex:0 0 auto}

  /* action toolbar */
  .toolbar{display:flex;gap:7px;flex-wrap:wrap;margin:16px 0 4px}
  .tbtn{border:1px solid var(--line-strong);background:var(--surface);color:var(--muted);
    font-size:12px;font-weight:600;padding:8px 12px;border-radius:10px;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .tbtn:active{transform:scale(.96)}
  .tbtn.primary{background:var(--accent);border-color:transparent;color:var(--bg)}
  .tbtn svg{width:14px;height:14px}

  /* tabs */
  .tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin:16px 0 20px;padding:12px 0 12px;
    position:sticky;top:0;background:linear-gradient(var(--bg) 74%,transparent);z-index:20;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;border:1px solid var(--line-strong);background:transparent;color:var(--muted);
    font-family:var(--disp);font-weight:600;font-size:12.5px;padding:9px 15px;border-radius:12px;transition:.18s;
    display:flex;flex-direction:column;gap:2px;align-items:center;min-width:74px}
  .tab small{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--faint)}
  .tab .tname{display:flex;align-items:center;gap:5px;line-height:1.15}
  .tab .tmeth{width:14px;height:14px;flex:0 0 auto}
  .methodchip{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 11px}
  .methodchip .mc{width:13px;height:13px;color:var(--accent);flex:0 0 auto}
  .tab.active{color:var(--bg);border-color:transparent;background:var(--tab-ac,var(--amber))}
  .tab.active small{color:rgba(28,23,20,.6)}

  .card{display:none;animation:rise .3s ease both}
  .card.show{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .rh{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line-strong);padding-bottom:13px}
  .rname{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:-.01em}
  .rsrc{font-family:var(--mono);font-size:10px;letter-spacing:.07em;color:var(--accent);text-transform:uppercase;text-align:right;flex:0 0 auto;line-height:1.5;max-width:44%}
  .tagline{color:var(--muted);font-size:13px;margin-top:11px}
  .rowacts{display:flex;gap:14px;margin-top:14px}
  .rowacts button{background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;
    padding:0;display:inline-flex;align-items:center;gap:5px;transition:.15s}
  .rowacts button:active{color:var(--ink)}
  .rowacts .del:active{color:var(--danger)}
  .rowacts svg{width:13px;height:13px}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:18px 0}
  .stat{background:var(--surface);padding:12px 6px;text-align:center}
  .stat .k{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase}
  .stat .v{font-family:var(--disp);font-weight:600;font-size:16px;margin-top:5px}
  .stat .v small{font-size:11px;color:var(--muted);font-weight:500}

  .scaler{display:flex;align-items:center;justify-content:space-between;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;padding:11px 14px;margin-bottom:8px}
  .scaler .lbl{font-size:13px;color:var(--muted)}
  .stepper{display:flex;align-items:center;gap:14px}
  .stepper button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line-strong);
    background:var(--raised);color:var(--ink);font-size:19px;font-family:var(--disp);line-height:1;transition:.15s}
  .stepper button:active{transform:scale(.9);background:var(--accent);color:var(--bg)}
  .stepper .cnt{font-family:var(--mono);font-weight:700;font-size:17px;min-width:48px;text-align:center}
  .stepper .cnt small{font-size:10px;color:var(--muted)}

  .sechd{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--faint);
    text-transform:uppercase;margin:26px 0 10px;display:flex;align-items:center;gap:10px}
  .sechd::after{content:"";flex:1;height:1px;background:var(--line)}
  .ing{display:flex;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
  .ing:last-child{border-bottom:none}
  .ing .nm{flex:1;font-size:14px}
  .ing .am{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--accent);white-space:nowrap}
  .ing .am small{color:var(--muted);font-weight:400;font-size:11px;margin-left:1px}

  .step{display:flex;gap:13px;padding:15px 0;border-bottom:1px solid var(--line)}
  .step:last-of-type{border-bottom:none}
  .num{flex:0 0 auto;width:27px;height:27px;border-radius:50%;border:1px solid var(--accent);color:var(--accent);
    font-family:var(--mono);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .scon{flex:1;min-width:0}
  .stitle{font-family:var(--disp);font-weight:600;font-size:15px}
  .sdesc{color:var(--muted);font-size:13.5px;margin-top:3px}
  .timer{display:inline-flex;align-items:center;gap:9px;margin-top:11px;background:var(--raised);
    border:1px solid var(--line-strong);border-radius:11px;padding:7px 11px 7px 8px;
    font-family:var(--mono);font-weight:700;font-size:13px;color:var(--ink);transition:.15s;user-select:none}
  .timer:active{transform:scale(.97)}
  .timer.run{border-color:var(--accent)}
  .timer.done{border-color:var(--teal);color:var(--teal)}
  .ring{transform:rotate(-90deg);flex:0 0 auto}
  .ring .bg{stroke:var(--line-strong)}
  .ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .95s linear}
  .timer.done .ring .fg{stroke:var(--teal)}

  .notes{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-top:22px}
  .notes li{list-style:none;font-size:13px;color:var(--muted);padding-left:16px;position:relative;margin:8px 0;line-height:1.5}
  .notes li:first-child{margin-top:0}.notes li:last-child{margin-bottom:0}
  .notes li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty h2{font-family:var(--disp);color:var(--ink);font-size:19px;margin-bottom:8px}
  .empty p{font-size:13px;margin-bottom:20px}

  footer{text-align:center;color:var(--faint);font-family:var(--mono);font-size:10px;letter-spacing:.1em;margin-top:34px}

  /* reorder mode */
  .reorder{display:none;animation:rise .3s ease both}
  .reorder.show{display:block}
  .reorder-hint{font-size:12.5px;color:var(--muted);margin:2px 0 16px;display:flex;align-items:center;gap:8px}
  .reorder-hint svg{width:15px;height:15px;flex:0 0 auto;color:var(--faint)}
  .sortrow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line-strong);
    border-radius:14px;padding:12px 14px;margin-bottom:10px;transition:box-shadow .15s,transform .06s,opacity .15s;touch-action:pan-y}
  .sortrow.dragging{opacity:.94;box-shadow:0 12px 30px rgba(0,0,0,.45);transform:scale(1.02);border-color:var(--srac,var(--amber));position:relative;z-index:5}
  .sortrow .handle{flex:0 0 auto;width:38px;height:38px;margin:-4px 0;border:none;background:none;color:var(--muted);
    display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;border-radius:9px}
  .sortrow .handle:active{cursor:grabbing;background:var(--raised);color:var(--ink)}
  .sortrow .handle svg{width:19px;height:19px;pointer-events:none}
  .sortrow .dotc{flex:0 0 auto;width:9px;height:9px;border-radius:50%}
  .sortrow .srname{flex:1;min-width:0;font-family:var(--disp);font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sortrow .srname small{font-family:var(--mono);font-weight:400;font-size:9.5px;letter-spacing:.06em;color:var(--faint);margin-left:8px}
  .sortrow .pos{flex:0 0 auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
  .sortrow .rowbtn{flex:0 0 auto;width:34px;height:34px;margin:-3px 0;border:1px solid var(--line-strong);
    background:var(--raised);color:var(--muted);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:.15s}
  .sortrow .rowbtn svg{width:15px;height:15px;pointer-events:none}
  .sortrow .rowbtn:active{color:var(--ink);transform:scale(.94)}
  .sortrow .rowbtn.del:active{color:var(--danger);border-color:var(--danger)}
  .tabs.hidden,#cards.hidden,footer.hidden{display:none!important}
  .tbtn.active{background:var(--accent);border-color:transparent;color:var(--bg)}

  /* toast */
  #toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--raised2);color:var(--ink);border:1px solid var(--line-strong);border-radius:12px;
    padding:11px 18px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:100;max-width:88vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* share banner */
  #banner{display:none;background:var(--surface);border:1px solid var(--accent);border-radius:14px;
    padding:14px 16px;margin:8px 0 4px;gap:12px;align-items:center;justify-content:space-between}
  #banner.show{display:flex}
  #banner .txt{font-size:13px}
  #banner .txt b{font-weight:700}
  #banner .bacts{display:flex;gap:8px;flex:0 0 auto}
  #banner button{border-radius:9px;font-size:12px;font-weight:600;padding:7px 12px;border:1px solid var(--line-strong);background:var(--raised);color:var(--ink)}
  #banner button.add{background:var(--accent);border-color:transparent;color:var(--bg)}

  /* editor overlay */
  .overlay{position:fixed;inset:0;background:rgba(12,9,7,.72);backdrop-filter:blur(3px);z-index:200;
    display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .sheet{background:var(--bg);border:1px solid var(--line-strong);border-radius:22px 22px 0 0;
    width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 18px calc(28px + env(safe-area-inset-bottom))}
  .sheet-hd{display:flex;align-items:center;justify-content:space-between;position:sticky;top:-20px;
    background:var(--bg);padding:4px 0 14px;margin:-4px 0 6px;z-index:2}
  .sheet-hd h3{font-family:var(--disp);font-size:18px;font-weight:700}
  .sheet-hd .x{background:none;border:none;color:var(--muted);font-size:26px;line-height:1;padding:0 4px}
  label.fl{display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--faint);margin:16px 0 7px}
  input.f,textarea.f{width:100%;background:var(--surface);border:1px solid var(--line-strong);border-radius:11px;
    color:var(--ink);font-family:inherit;font-size:14px;padding:11px 13px;transition:.15s}
  input.f:focus,textarea.f:focus{outline:none;border-color:var(--accent)}
  textarea.f{resize:vertical;min-height:64px;line-height:1.5}
  .toggle{display:flex;gap:8px}
  .toggle button{flex:1;background:var(--surface);border:1px solid var(--line-strong);color:var(--muted);
    border-radius:11px;padding:10px;font-weight:600;font-size:13px;transition:.15s}
  .toggle button.on{background:var(--accent);border-color:transparent;color:var(--bg)}
  .swatches{display:flex;gap:9px;flex-wrap:wrap}
  .sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;transition:.15s}
  .sw.on{border-color:var(--ink);transform:scale(1.08)}
  .rowset{display:flex;gap:8px;margin-bottom:8px;align-items:center}
  .rowset input.f{padding:9px 11px;font-size:13px}
  .rowset .amt{flex:0 0 66px}.rowset .unit{flex:0 0 54px}
  .rowset .rm{flex:0 0 auto;width:34px;height:34px;border-radius:9px;border:1px solid var(--line-strong);
    background:var(--raised);color:var(--muted);font-size:16px;line-height:1}
  .rowset .rm:active{color:var(--danger)}
  .statrow{display:flex;gap:8px;margin-bottom:8px}
  .statrow input.f{padding:9px 10px;font-size:13px}
  .addrow{width:100%;background:var(--raised);border:1px dashed var(--line-strong);color:var(--muted);
    border-radius:11px;padding:9px;font-size:12.5px;font-weight:600;margin-top:2px;transition:.15s}
  .addrow:active{color:var(--ink)}
  .sheet-foot{display:flex;gap:10px;margin-top:26px;position:sticky;bottom:-1px;background:var(--bg);padding:14px 0 2px}
  .sheet-foot button{flex:1;border-radius:12px;padding:14px;font-weight:700;font-size:14px;border:1px solid var(--line-strong)}
  .sheet-foot .save{background:var(--accent);border-color:transparent;color:var(--bg)}
  .sheet-foot .cancel{background:transparent;color:var(--muted)}
  .hint{font-size:11px;color:var(--faint);margin-top:6px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">Brew&nbsp;Spec · Coffee</div>
      <h1>Coffee Recipes</h1>
    </div>
    <svg class="mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <path d="M11 6h18l-2.4 19.5a4 4 0 0 1-4 3.5h-5.2a4 4 0 0 1-4-3.5L11 6Z" stroke="var(--amber)" stroke-width="1.6"/>
      <path d="M13.4 13.5h13.2" stroke="var(--teal)" stroke-width="1.6"/>
      <path d="M15 34.2h10" stroke="var(--amber)" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M20 29v5.2" stroke="var(--amber)" stroke-width="1.6"/>
    </svg>
  </header>

  <div class="toolbar">
    <button class="tbtn primary" id="btnNew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>새 레시피</button>
    <button class="tbtn" id="btnExport"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>내보내기</button>
    <button class="tbtn" id="btnImport"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 0l-4 4m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>가져오기</button>
    <button class="tbtn" id="btnReorder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16M7 4L4 7M7 4l3 3M17 20V4M17 20l-3-3M17 20l3-3"/></svg>관리</button>
    <button class="tbtn" id="btnReset"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 109-9 9 9 0 00-6.4 2.6L3 8m0-5v5h5"/></svg>기본값</button>
    <input type="file" id="fileImport" accept=".json,application/json,text/plain" hidden>
  </div>

  <div id="banner">
    <div class="txt">공유된 레시피 <b id="banner-name"></b>를 추가할까요?</div>
    <div class="bacts"><button class="add" id="banner-add">추가</button><button id="banner-no">취소</button></div>
  </div>

  <nav class="tabs" id="tabs"></nav>
  <main id="cards"></main>
  <section id="reorder" class="reorder"></section>

  <footer>BREW · TIME · TASTE — 내 손으로 내리는 한 잔</footer>
</div>

<div id="toast"></div>

<!-- Editor -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-hd">
      <h3 id="sheetTitle">새 레시피</h3>
      <button class="x" id="sheetClose" aria-label="닫기">×</button>
    </div>

    <label class="fl">레시피 이름 *</label>
    <input class="f" id="f-name" placeholder="예: 나만의 아침 레시피">

    <label class="fl">출처 · 부제</label>
    <input class="f" id="f-src" placeholder="예: 집 · Inverted">

    <label class="fl">짧은 태그 (탭에 표시)</label>
    <input class="f" id="f-tag" placeholder="예: MY / WAC 2016">

    <label class="fl">한 줄 설명</label>
    <textarea class="f" id="f-tagline" placeholder="이 레시피의 특징을 한 줄로"></textarea>

    <label class="fl">종류</label>
    <div class="toggle" id="f-type">
      <button data-type="hot" class="on">☕ 핫</button>
      <button data-type="iced">🧊 아이스</button>
    </div>

    <label class="fl">추출 방식</label>
    <div class="toggle" id="f-method">
      <button data-method="aeropress" class="on">에어로프레스</button>
      <button data-method="handdrip">핸드드립</button>
    </div>

    <label class="fl">테마 색</label>
    <div class="swatches" id="f-swatches"></div>

    <label class="fl">요약 스탯 (최대 4개 · 비우면 생략)</label>
    <div id="f-stats"></div>

    <label class="fl">재료 (분량 조절 대상)</label>
    <div id="f-ings"></div>
    <button class="addrow" id="addIng">+ 재료 추가</button>

    <label class="fl">브루잉 단계</label>
    <div id="f-steps"></div>
    <button class="addrow" id="addStep">+ 단계 추가</button>
    <div class="hint">각 단계의 "초"에 숫자를 넣으면 그 단계에 타이머 버튼이 생겨요. 비워두면 타이머 없음.</div>

    <label class="fl">노트 (한 줄에 하나씩)</label>
    <textarea class="f" id="f-notes" placeholder="팁이나 주의사항을 줄바꿈으로 구분"></textarea>

    <div class="sheet-foot">
      <button class="cancel" id="sheetCancel">취소</button>
      <button class="save" id="sheetSave">저장</button>
    </div>
  </div>
</div>

<script>
"use strict";
const LS_KEY="brewspec.recipes.v2";

/* ---------- state + storage ---------- */
let recipes=[], activeId=null;
const servings={};
const uid=()=> (crypto.randomUUID?crypto.randomUUID():"r"+Date.now()+Math.random().toString(16).slice(2));

function load(){
  let existed=false;
  try{const raw=localStorage.getItem(LS_KEY);if(raw){recipes=JSON.parse(raw);existed=true;}}catch(e){}
  if(!Array.isArray(recipes)||!recipes.length){recipes=structuredClone(DEFAULTS);existed=false;}
  // Seed newly-added built-in recipes once (won't resurrect user-deleted ones)
  const added=[];
  try{
    let seeded=null;
    try{const s=localStorage.getItem(SEED_KEY);if(s)seeded=JSON.parse(s);}catch(e){}
    if(!Array.isArray(seeded))seeded=existed?["filip","iced","lukas"]:DEFAULTS.map(d=>d.id);
    const seen=new Set(seeded),have=new Set(recipes.map(r=>r.id));
    DEFAULTS.forEach(d=>{if(!seen.has(d.id)){if(!have.has(d.id)){recipes.push(structuredClone(d));added.push(d.id);}seen.add(d.id);}});
    localStorage.setItem(SEED_KEY,JSON.stringify([...seen]));
  }catch(e){
    const have=new Set(recipes.map(r=>r.id));
    DEFAULTS.forEach(d=>{if(!have.has(d.id)){recipes.push(structuredClone(d));added.push(d.id);}});
  }
  // One-time correction: replace the earlier draft of iced46 with the verified recipe
  try{
    if(!localStorage.getItem(FIX_KEY)){
      const i=recipes.findIndex(r=>r.id==="iced46");
      if(i>-1){const def=DEFAULTS.find(d=>d.id==="iced46");if(def)recipes[i]=structuredClone(def);}
      localStorage.setItem(FIX_KEY,"1");
    }
  }catch(e){}
  // Backfill extraction method on older / imported recipes
  const dmethod={};DEFAULTS.forEach(d=>{dmethod[d.id]=d.method;});
  recipes.forEach(r=>{if(!r.method)r.method=dmethod[r.id]||"aeropress";});
  save();
  if(added.length)activeId=added[added.length-1];
  if(!activeId||!recipes.find(r=>r.id===activeId))activeId=recipes[0]?.id||null;
}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(recipes));}catch(e){toast("저장 공간이 부족해요");}}

/* ---------- utils ---------- */
const fmt=n=>{const r=Math.round(n*10)/10;return Number.isInteger(r)?r.toString():r.toFixed(1);};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),2200);}
function utf8ToB64(s){const b=new TextEncoder().encode(s);let bin="";b.forEach(x=>bin+=String.fromCharCode(x));return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");}
function b64ToUtf8(b){b=b.replace(/-/g,"+").replace(/_/g,"/");const bin=atob(b);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new TextDecoder().decode(u);}
const METHODS={aeropress:["에어로프레스","AEROPRESS"],handdrip:["핸드드립","POUR-OVER"]};
function methodLabel(m){return (METHODS[m]||METHODS.aeropress)[0];}
function methodIcon(m,cls){
  m=METHODS[m]?m:"aeropress";
  if(m==="handdrip")return `<svg class="${cls||""}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5h14l-5.4 9h-3.2L5 5Z"/><path d="M12 14v4.5"/></svg>`;
  return `<svg class="${cls||""}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7.5" y="4" width="9" height="15" rx="1.6"/><path d="M9.6 8h4.8"/></svg>`;
}

/* ---------- render ---------- */
const tabsEl=document.getElementById("tabs");
const cardsEl=document.getElementById("cards");

function renderAll(){
  tabsEl.innerHTML="";cardsEl.innerHTML="";
  if(!recipes.length){
    tabsEl.style.display="none";
    cardsEl.innerHTML=`<div class="empty"><h2>레시피가 비어 있어요</h2><p>새 레시피를 만들거나 기본값을 복원해 시작하세요.</p></div>`;
    return;
  }
  tabsEl.style.display="flex";
  recipes.forEach(r=>{
    const tab=document.createElement("button");
    tab.className="tab"+(r.id===activeId?" active":"");
    tab.style.setProperty("--tab-ac",r.accent);
    if(r.id===activeId)tab.style.color="";
    else tab.style.color=r.accent;
    const short=r.name.length>7?r.name.slice(0,7)+"…":r.name;
    tab.innerHTML=`<span class="tname">${methodIcon(r.method,"tmeth")}${esc(short)}</span><small>${esc(r.tag||(r.type==="iced"?"ICED":"HOT"))}</small>`;
    tab.onclick=()=>{activeId=r.id;renderAll();window.scrollTo({top:0,behavior:"smooth"});};
    tabsEl.appendChild(tab);
    if(r.id===activeId)cardsEl.appendChild(buildCard(r));
  });
}

function buildCard(r){
  if(!(r.id in servings))servings[r.id]=1;
  const c=document.createElement("section");
  c.className="card show";c.style.setProperty("--accent",r.accent);
  const statsHTML=(r.stats||[]).filter(s=>s&&s[1]!=="").map(s=>`<div class="stat"><div class="k">${esc(s[0])}</div><div class="v">${esc(s[1])}<small>${esc(s[2]||"")}</small></div></div>`).join("");
  c.innerHTML=`
    <div class="rh">
      <div class="rname">${esc(r.name)}</div>
      <div class="rsrc">${esc(r.src||"")}</div>
    </div>
    <div class="methodchip">${methodIcon(r.method,"mc")}<span>${esc(methodLabel(r.method))}</span></div>
    ${r.tagline?`<p class="tagline">${esc(r.tagline)}</p>`:""}
    <div class="rowacts">
      <button data-a="edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4Z"/></svg>편집</button>
      <button data-a="share"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>공유</button>
      <button data-a="dup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>복제</button>
      <button data-a="del" class="del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m2 0v14a2 2 0 01-2 2H8a2 2 0 01-2-2V6"/></svg>삭제</button>
    </div>
    ${statsHTML?`<div class="stats">${statsHTML}</div>`:`<div style="height:18px"></div>`}
    ${(r.ingredients&&r.ingredients.length)?`
      <div class="scaler">
        <span class="lbl">분량</span>
        <div class="stepper">
          <button data-act="minus">−</button>
          <span class="cnt" id="cnt">${servings[r.id]}<small>잔</small></span>
          <button data-act="plus">+</button>
        </div>
      </div>
      <div class="sechd">재료</div>
      <div id="ings">${r.ingredients.map(g=>`<div class="ing"><span class="nm">${esc(g.nm)}</span><span class="am" data-base="${g.am}">${fmt(g.am*servings[r.id])}<small>${esc(g.u||"")}</small></span></div>`).join("")}</div>`:""}
    ${(r.steps&&r.steps.length)?`
      <div class="sechd">브루잉</div>
      <div>${r.steps.map((s,i)=>`<div class="step"><div class="num">${i+1}</div><div class="scon"><div class="stitle">${esc(s.t)}</div>${s.d?`<div class="sdesc">${esc(s.d)}</div>`:""}${s.s?timerHTML(s.s):""}</div></div>`).join("")}</div>`:""}
    ${(r.notes&&r.notes.length)?`<ul class="notes">${r.notes.map(n=>`<li>${esc(n)}</li>`).join("")}</ul>`:""}
  `;
  // wire card actions
  c.querySelector('[data-a="edit"]').onclick=()=>openEditor(r);
  c.querySelector('[data-a="share"]').onclick=()=>shareRecipe(r);
  c.querySelector('[data-a="dup"]').onclick=()=>duplicateRecipe(r);
  c.querySelector('[data-a="del"]').onclick=()=>deleteRecipe(r);
  const minus=c.querySelector('[data-act="minus"]'),plus=c.querySelector('[data-act="plus"]');
  if(minus)minus.onclick=()=>changeServings(r,-1,c);
  if(plus)plus.onclick=()=>changeServings(r,1,c);
  c.addEventListener("click",e=>{const tm=e.target.closest(".timer");if(tm)toggleTimer(tm);});
  return c;
}
function changeServings(r,d,c){
  let v=Math.max(1,Math.min(12,servings[r.id]+d));servings[r.id]=v;
  c.querySelector("#cnt").innerHTML=v+"<small>잔</small>";
  c.querySelectorAll("#ings .am").forEach(a=>{const base=parseFloat(a.dataset.base);const u=a.querySelector("small").textContent;a.innerHTML=fmt(base*v)+`<small>${u}</small>`;});
}
function timerHTML(sec){const R=11,C=2*Math.PI*R;return `<div class="timer" data-sec="${sec}" data-c="${C.toFixed(2)}" role="button" tabindex="0"><svg class="ring" width="28" height="28" viewBox="0 0 28 28"><circle class="bg" cx="14" cy="14" r="${R}" fill="none" stroke-width="2.4"/><circle class="fg" cx="14" cy="14" r="${R}" fill="none" stroke-width="2.4" stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="0"/></svg><span class="lab">${sec}초</span></div>`;}

/* ---------- timers ---------- */
const active=new WeakMap();
function toggleTimer(el){
  if(active.has(el)){clearInterval(active.get(el).iv);active.delete(el);resetTimer(el);return;}
  const total=parseInt(el.dataset.sec,10),C=parseFloat(el.dataset.c);
  const fg=el.querySelector(".fg"),lab=el.querySelector(".lab");
  el.classList.add("run");el.classList.remove("done");fg.style.strokeDashoffset=0;
  const start=Date.now();
  const iv=setInterval(()=>{
    const left=Math.max(0,total-(Date.now()-start)/1000);
    fg.style.strokeDashoffset=(C*(1-left/total)).toFixed(2);
    lab.textContent=mmss(Math.ceil(left));
    if(left<=0){clearInterval(iv);active.delete(el);el.classList.remove("run");el.classList.add("done");
      lab.textContent="완료 ✓";fg.style.strokeDashoffset=C.toFixed(2);
      if(navigator.vibrate)navigator.vibrate([90,60,90]);setTimeout(()=>resetTimer(el),3500);}
  },100);
  active.set(el,{iv});
}
function resetTimer(el){el.classList.remove("run","done");el.querySelector(".fg").style.strokeDashoffset=0;el.querySelector(".lab").textContent=el.dataset.sec+"초";}
function mmss(s){const m=Math.floor(s/60),x=s%60;return m?`${m}:${String(x).padStart(2,"0")}`:`${x}초`;}

/* ---------- CRUD ---------- */
function deleteRecipe(r){
  if(!confirm(`'${r.name}' 레시피를 삭제할까요?`))return;
  recipes=recipes.filter(x=>x.id!==r.id);
  if(activeId===r.id)activeId=recipes[0]?.id||null;
  save();renderAll();toast("삭제했어요");
}
function duplicateRecipe(r){
  const copy=structuredClone(r);copy.id=uid();copy.name=r.name+" (사본)";
  const i=recipes.findIndex(x=>x.id===r.id);recipes.splice(i+1,0,copy);activeId=copy.id;
  save();renderAll();toast("복제했어요 — 편집해 보세요");
}
function shareRecipe(r){
  const payload=structuredClone(r);delete payload.id;
  const url=location.origin+location.pathname+"#r="+utf8ToB64(JSON.stringify(payload));
  if(navigator.share){navigator.share({title:r.name,text:`커피 레시피: ${r.name}`,url}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>toast("공유 링크를 복사했어요")).catch(()=>prompt("아래 링크를 복사하세요",url));}
  else prompt("아래 링크를 복사하세요",url);
}

/* ---------- editor ---------- */
const overlay=document.getElementById("overlay");
let editState=null; // {id|null, type, accent}

function makeIngRow(g={nm:"",am:"",u:"g"}){
  const d=document.createElement("div");d.className="rowset";
  d.innerHTML=`<input class="f nm" placeholder="재료명" value="${esc(g.nm)}"><input class="f amt" type="number" inputmode="decimal" placeholder="양" value="${g.am??""}"><input class="f unit" placeholder="단위" value="${esc(g.u??"")}"><button class="rm" aria-label="삭제">×</button>`;
  d.querySelector(".rm").onclick=()=>d.remove();
  return d;
}
function makeStepRow(s={t:"",d:"",s:""}){
  const d=document.createElement("div");d.className="rowset";d.style.flexWrap="wrap";
  d.innerHTML=`<input class="f nm" style="flex:1 1 100%" placeholder="단계 제목 (예: 물 붓기)" value="${esc(s.t)}">
    <input class="f" style="flex:1 1 60%" placeholder="설명" value="${esc(s.d||"")}">
    <input class="f amt" type="number" inputmode="numeric" placeholder="초" value="${s.s??""}" title="타이머 초">
    <button class="rm" aria-label="삭제">×</button>`;
  d.querySelector(".rm").onclick=()=>d.remove();
  return d;
}
function makeStatRow(s=["","",""]){
  const d=document.createElement("div");d.className="statrow";
  d.innerHTML=`<input class="f" placeholder="이름" value="${esc(s[0])}"><input class="f" placeholder="값" value="${esc(s[1])}"><input class="f" placeholder="단위" value="${esc(s[2])}">`;
  return d;
}

function openEditor(r){
  editState={id:r?r.id:null,type:r?r.type:"hot",accent:r?r.accent:ACCENTS[0][1],method:r?(r.method||"aeropress"):"aeropress"};
  document.getElementById("sheetTitle").textContent=r?"레시피 편집":"새 레시피";
  document.getElementById("f-name").value=r?r.name:"";
  document.getElementById("f-src").value=r?(r.src||""):"";
  document.getElementById("f-tag").value=r?(r.tag||""):"";
  document.getElementById("f-tagline").value=r?(r.tagline||""):"";
  // type
  document.querySelectorAll('#f-type button').forEach(b=>b.classList.toggle("on",b.dataset.type===editState.type));
  // method
  document.querySelectorAll('#f-method button').forEach(b=>b.classList.toggle("on",b.dataset.method===editState.method));
  // swatches
  const sw=document.getElementById("f-swatches");sw.innerHTML="";
  ACCENTS.forEach(([nm,hex])=>{const b=document.createElement("button");b.className="sw"+(hex===editState.accent?" on":"");b.style.background=hex;b.title=nm;
    b.onclick=()=>{editState.accent=hex;sw.querySelectorAll(".sw").forEach(x=>x.classList.remove("on"));b.classList.add("on");applyEditorAccent();};sw.appendChild(b);});
  // stats (always 4 slots)
  const st=document.getElementById("f-stats");st.innerHTML="";
  const stats=(r&&r.stats)?r.stats.slice(0,4):[["원두","","g"],["물","","g"],["온도","","°C"],["총 시간","",""]];
  while(stats.length<4)stats.push(["","",""]);
  stats.forEach(s=>st.appendChild(makeStatRow(s)));
  // ings
  const ig=document.getElementById("f-ings");ig.innerHTML="";
  ((r&&r.ingredients&&r.ingredients.length)?r.ingredients:[{nm:"",am:"",u:"g"}]).forEach(g=>ig.appendChild(makeIngRow(g)));
  // steps
  const sp=document.getElementById("f-steps");sp.innerHTML="";
  ((r&&r.steps&&r.steps.length)?r.steps:[{t:"",d:"",s:""}]).forEach(s=>sp.appendChild(makeStepRow(s)));
  // notes
  document.getElementById("f-notes").value=r&&r.notes?r.notes.join("\n"):"";
  applyEditorAccent();
  overlay.classList.add("show");document.getElementById("sheet").scrollTop=0;
}
function applyEditorAccent(){document.getElementById("sheet").style.setProperty("--accent",editState.accent);}
function closeEditor(){overlay.classList.remove("show");}

function saveEditor(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){toast("레시피 이름을 입력해 주세요");document.getElementById("f-name").focus();return;}
  const stats=[...document.querySelectorAll("#f-stats .statrow")].map(row=>{const[a,b,c]=row.querySelectorAll("input");return[a.value.trim(),b.value.trim(),c.value.trim()];}).filter(s=>s[1]!=="");
  const ingredients=[...document.querySelectorAll("#f-ings .rowset")].map(row=>{const nm=row.querySelector(".nm").value.trim();const am=parseFloat(row.querySelector(".amt").value);const u=row.querySelector(".unit").value.trim();return nm?{nm,am:isNaN(am)?0:am,u}:null;}).filter(Boolean);
  const steps=[...document.querySelectorAll("#f-steps .rowset")].map(row=>{const ins=row.querySelectorAll("input");const t=ins[0].value.trim();const d=ins[1].value.trim();const sec=parseInt(ins[2].value,10);const o={t,d};if(!isNaN(sec)&&sec>0)o.s=sec;return t?o:null;}).filter(Boolean);
  const notes=document.getElementById("f-notes").value.split("\n").map(x=>x.trim()).filter(Boolean);
  const rec={
    id:editState.id||uid(),accent:editState.accent,type:editState.type,method:editState.method,
    name,src:document.getElementById("f-src").value.trim(),
    tag:document.getElementById("f-tag").value.trim(),
    tagline:document.getElementById("f-tagline").value.trim(),
    stats,ingredients,steps,notes
  };
  if(editState.id){const i=recipes.findIndex(x=>x.id===editState.id);recipes[i]=rec;}
  else{recipes.push(rec);}
  activeId=rec.id;save();renderAll();closeEditor();
  if(reordering)buildReorderList();
  toast(editState.id?"저장했어요":"새 레시피를 추가했어요");
}

/* ---------- export / import / share-in ---------- */
async function exportAll(){
  const json=JSON.stringify(recipes,null,2);
  const fname="brew-recipes.json";
  // Mobile-native: share sheet (Files 저장 / 전송)
  try{
    const file=new File([json],fname,{type:"application/json"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"Brew Spec 레시피"});
      return;
    }
  }catch(e){if(e&&e.name==="AbortError")return;} // 사용자가 취소
  // Fallback: anchor download (데스크톱/구형)
  try{
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    toast("JSON 파일로 내보냈어요");
  }catch(e){toast("내보내기에 실패했어요");}
}
function importFile(file){
  const rd=new FileReader();
  rd.onload=()=>{try{
    const data=JSON.parse(rd.result);const arr=Array.isArray(data)?data:[data];
    let n=0;arr.forEach(r=>{if(r&&r.name){r.id=uid();recipes.push(r);n++;}});
    if(n){save();activeId=recipes[recipes.length-1].id;renderAll();toast(`${n}개 레시피를 가져왔어요`);}
    else toast("가져올 레시피를 찾지 못했어요");
  }catch(e){toast("파일을 읽지 못했어요 (JSON 형식 확인)");}};
  rd.readAsText(file);
}
function checkShareLink(){
  const m=location.hash.match(/^#r=(.+)$/);if(!m)return;
  try{
    const rec=JSON.parse(b64ToUtf8(m[1]));
    if(rec&&rec.name){
      document.getElementById("banner-name").textContent=`'${rec.name}'`;
      const banner=document.getElementById("banner");banner.classList.add("show");
      document.getElementById("banner-add").onclick=()=>{rec.id=uid();recipes.push(rec);activeId=rec.id;save();renderAll();banner.classList.remove("show");history.replaceState(null,"",location.pathname);toast("공유 레시피를 추가했어요");};
      document.getElementById("banner-no").onclick=()=>{banner.classList.remove("show");history.replaceState(null,"",location.pathname);};
    }
  }catch(e){/* ignore malformed */}
}

/* ---------- toolbar wiring ---------- */
document.getElementById("btnNew").onclick=()=>openEditor(null);
document.getElementById("btnExport").onclick=exportAll;
document.getElementById("btnImport").onclick=()=>document.getElementById("fileImport").click();
document.getElementById("fileImport").onchange=e=>{if(e.target.files[0])importFile(e.target.files[0]);e.target.value="";};
document.getElementById("btnReset").onclick=()=>{if(confirm("기본 레시피 3종으로 되돌릴까요? 지금 목록은 사라져요. (내보내기로 먼저 백업할 수 있어요)")){recipes=structuredClone(DEFAULTS);activeId=recipes[0].id;save();renderAll();toast("기본값으로 복원했어요");}};
document.getElementById("sheetClose").onclick=closeEditor;
document.getElementById("sheetCancel").onclick=closeEditor;
document.getElementById("sheetSave").onclick=saveEditor;
document.getElementById("addIng").onclick=()=>document.getElementById("f-ings").appendChild(makeIngRow());
document.getElementById("addStep").onclick=()=>document.getElementById("f-steps").appendChild(makeStepRow());
document.querySelectorAll('#f-type button').forEach(b=>b.onclick=()=>{editState.type=b.dataset.type;document.querySelectorAll('#f-type button').forEach(x=>x.classList.toggle("on",x===b));});
document.querySelectorAll('#f-method button').forEach(b=>b.onclick=()=>{editState.method=b.dataset.method;document.querySelectorAll('#f-method button').forEach(x=>x.classList.toggle("on",x===b));});
overlay.addEventListener("click",e=>{if(e.target===overlay)closeEditor();});

/* ---------- reorder mode ---------- */
const reorderEl=document.getElementById("reorder");
const btnReorder=document.getElementById("btnReorder");
const footerEl=document.querySelector("footer");
let reordering=false;

btnReorder.onclick=()=>reordering?exitReorder():enterReorder();
function setReorderLabel(t){const n=[...btnReorder.childNodes].reverse().find(x=>x.nodeType===3&&x.textContent.trim());if(n)n.textContent=t;}

function enterReorder(){
  if(!recipes.length){toast("레시피가 없어요");return;}
  reordering=true;
  btnReorder.classList.add("active");setReorderLabel("완료");
  tabsEl.classList.add("hidden");cardsEl.classList.add("hidden");footerEl.classList.add("hidden");
  buildReorderList();reorderEl.classList.add("show");
  window.scrollTo({top:0,behavior:"smooth"});
}
function exitReorder(){
  reordering=false;
  btnReorder.classList.remove("active");setReorderLabel("관리");
  reorderEl.classList.remove("show");reorderEl.innerHTML="";
  tabsEl.classList.remove("hidden");cardsEl.classList.remove("hidden");footerEl.classList.remove("hidden");
  renderAll();
}
function buildReorderList(){
  reorderEl.innerHTML=`<div class="reorder-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4v16M7 4L4 7M7 4l3 3M17 20V4M17 20l-3-3M17 20l3-3"/></svg>핸들(≡)을 끌어 순서 변경 · 오른쪽 아이콘으로 편집/삭제</div>`;
  recipes.forEach(r=>{
    const row=document.createElement("div");
    row.className="sortrow";row.dataset.id=r.id;row.style.setProperty("--srac",r.accent);
    row.innerHTML=`<button class="handle" aria-label="끌어서 이동"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 8h16M4 12h16M4 16h16"/></svg></button>
      <span class="dotc" style="background:${r.accent}"></span>
      <span class="srname">${esc(r.name)}<small>${esc(r.tag||(r.type==="iced"?"ICED":"HOT"))}</small></span>
      <button class="rowbtn" data-ra="edit" aria-label="편집"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4Z"/></svg></button>
      <button class="rowbtn del" data-ra="del" aria-label="삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m2 0v14a2 2 0 01-2 2H8a2 2 0 01-2-2V6"/></svg></button>`;
    row.querySelector('[data-ra="edit"]').onclick=()=>{const rec=recipes.find(x=>x.id===r.id);if(rec)openEditor(rec);};
    row.querySelector('[data-ra="del"]').onclick=()=>{
      const rec=recipes.find(x=>x.id===r.id);if(!rec)return;
      if(!confirm(`'${rec.name}' 레시피를 삭제할까요?`))return;
      recipes=recipes.filter(x=>x.id!==r.id);
      if(activeId===r.id)activeId=recipes[0]?.id||null;
      save();
      if(recipes.length<2){exitReorder();toast("삭제했어요");return;}
      buildReorderList();toast("삭제했어요");
    };
    reorderEl.appendChild(row);
  });
  initSortable(reorderEl);
}
function initSortable(list){
  list.querySelectorAll(".sortrow").forEach(row=>{
    const handle=row.querySelector(".handle");
    handle.addEventListener("pointerdown",e=>{
      e.preventDefault();
      row.classList.add("dragging");
      const move=ev=>{
        const y=ev.clientY;
        const others=[...list.querySelectorAll(".sortrow:not(.dragging)")];
        let target=null;
        for(const s of others){const b=s.getBoundingClientRect();if(y<b.top+b.height/2){target=s;break;}}
        if(target)list.insertBefore(row,target);
        else list.appendChild(row);
      };
      const up=()=>{
        row.classList.remove("dragging");
        window.removeEventListener("pointermove",move);
        window.removeEventListener("pointerup",up);
        window.removeEventListener("pointercancel",up);
        commitOrder(list);
      };
      window.addEventListener("pointermove",move);
      window.addEventListener("pointerup",up);
      window.addEventListener("pointercancel",up);
    });
  });
}
function commitOrder(list){
  const ids=[...list.querySelectorAll(".sortrow")].map(r=>r.dataset.id);
  const map=new Map(recipes.map(r=>[r.id,r]));
  const next=ids.map(id=>map.get(id)).filter(Boolean);
  const changed=next.some((r,i)=>r.id!==recipes[i].id);
  recipes=next;save();
  if(changed)toast("순서를 저장했어요");
}

/* ---------- boot ---------- */
load();renderAll();checkShareLink();
</script>
