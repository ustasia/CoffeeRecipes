<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1C1714">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Brew Spec · 에어로프레스 레시피</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#1C1714; --surface:#26201B; --raised:#322A22;
    --ink:#F1EADF; --muted:#A99A8A; --faint:#6E6055;
    --line:rgba(241,234,223,.10); --line-strong:rgba(241,234,223,.18);
    --amber:#E6A24C; --copper:#D07B43; --teal:#5FB6A8;
    --accent:var(--amber);
    --mono:"Space Mono",ui-monospace,monospace;
    --disp:"Space Grotesk","Pretendard",sans-serif;
    --body:"Pretendard","Space Grotesk",-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--body);
    line-height:1.55;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 18px 64px}

  /* Header */
  header{padding:28px 0 18px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
  .brand{font-family:var(--mono);font-size:11px;letter-spacing:.32em;color:var(--muted);text-transform:uppercase}
  h1{font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:-.01em;line-height:1.05;margin-top:6px}
  .sub{color:var(--muted);font-size:13px;margin-top:7px;max-width:34ch}
  .markwrap{flex:0 0 auto}
  .mark{width:46px;height:46px;display:block}

  /* Tabs */
  .tabs{display:flex;gap:8px;margin:6px 0 22px;position:sticky;top:0;background:linear-gradient(var(--bg) 72%,transparent);padding:14px 0 12px;z-index:20}
  .tab{flex:1;border:1px solid var(--line-strong);background:transparent;color:var(--muted);
    font-family:var(--disp);font-weight:600;font-size:12.5px;padding:11px 6px;border-radius:13px;cursor:pointer;
    transition:.18s;letter-spacing:.01em;line-height:1.25;text-align:center;display:flex;flex-direction:column;gap:3px;align-items:center}
  .tab .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.55}
  .tab small{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--faint)}
  .tab.active{color:var(--bg);border-color:transparent;background:var(--accent)}
  .tab.active small{color:rgba(28,23,20,.62)}
  .tab.active .dot{opacity:.85}

  /* Card */
  .card{display:none;animation:rise .32s ease both}
  .card.show{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .rh{display:flex;align-items:baseline;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line-strong);padding-bottom:14px}
  .rname{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:-.01em}
  .rsrc{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--accent);text-transform:uppercase;text-align:right;flex:0 0 auto;line-height:1.5}
  .tagline{color:var(--muted);font-size:13px;margin-top:10px}

  /* Stats strip */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin:18px 0}
  .stat{background:var(--surface);padding:12px 8px;text-align:center}
  .stat .k{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}
  .stat .v{font-family:var(--disp);font-weight:600;font-size:16px;margin-top:5px}
  .stat .v small{font-size:11px;color:var(--muted);font-weight:500}

  /* Serving scaler */
  .scaler{display:flex;align-items:center;justify-content:space-between;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px}
  .scaler .lbl{font-size:13px;color:var(--muted)}
  .stepper{display:flex;align-items:center;gap:14px}
  .stepper button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line-strong);
    background:var(--raised);color:var(--ink);font-size:19px;font-family:var(--disp);cursor:pointer;line-height:1;transition:.15s}
  .stepper button:active{transform:scale(.92);background:var(--accent);color:var(--bg)}
  .stepper .cnt{font-family:var(--mono);font-weight:700;font-size:17px;min-width:46px;text-align:center}
  .stepper .cnt small{font-size:10px;color:var(--muted)}

  /* Ingredients */
  .sechd{font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--faint);
    text-transform:uppercase;margin:26px 0 11px;display:flex;align-items:center;gap:10px}
  .sechd::after{content:"";flex:1;height:1px;background:var(--line)}
  .ing{display:flex;align-items:baseline;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
  .ing:last-child{border-bottom:none}
  .ing .nm{flex:1;font-size:14px}
  .ing .am{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--accent)}
  .ing .am small{color:var(--muted);font-weight:400;font-size:11px;margin-left:1px}

  /* Steps */
  .step{display:flex;gap:13px;padding:15px 0;border-bottom:1px solid var(--line)}
  .step:last-of-type{border-bottom:none}
  .num{flex:0 0 auto;width:27px;height:27px;border-radius:50%;border:1px solid var(--accent);color:var(--accent);
    font-family:var(--mono);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .scon{flex:1;min-width:0}
  .stitle{font-family:var(--disp);font-weight:600;font-size:15px}
  .sdesc{color:var(--muted);font-size:13.5px;margin-top:3px}
  .timer{display:inline-flex;align-items:center;gap:9px;margin-top:11px;background:var(--raised);
    border:1px solid var(--line-strong);border-radius:11px;padding:7px 11px 7px 8px;cursor:pointer;
    font-family:var(--mono);font-weight:700;font-size:13px;color:var(--ink);transition:.15s;user-select:none}
  .timer:active{transform:scale(.97)}
  .timer.run{border-color:var(--accent)}
  .timer.done{border-color:var(--teal);color:var(--teal)}
  .ring{transform:rotate(-90deg);flex:0 0 auto}
  .ring .bg{stroke:var(--line-strong)}
  .ring .fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .95s linear}
  .timer.done .ring .fg{stroke:var(--teal)}

  /* Notes */
  .notes{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-top:22px}
  .notes li{list-style:none;font-size:13px;color:var(--muted);padding-left:16px;position:relative;margin:8px 0;line-height:1.5}
  .notes li:first-child{margin-top:0}.notes li:last-child{margin-bottom:0}
  .notes li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}

  footer{text-align:center;color:var(--faint);font-family:var(--mono);font-size:10px;letter-spacing:.1em;margin-top:34px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">Brew&nbsp;Spec · Championship</div>
      <h1>에어로프레스<br>레시피 카드</h1>
      <p class="sub">대회 우승 레시피 3종. 분량을 조절하고 단계별 타이머로 따라 내려요.</p>
    </div>
    <div class="markwrap">
      <svg class="mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
        <path d="M11 6h18l-2.4 19.5a4 4 0 0 1-4 3.5h-5.2a4 4 0 0 1-4-3.5L11 6Z" stroke="var(--amber)" stroke-width="1.6"/>
        <path d="M13.4 13.5h13.2" stroke="var(--teal)" stroke-width="1.6"/>
        <path d="M15 34.2h10" stroke="var(--amber)" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M20 29v5.2" stroke="var(--amber)" stroke-width="1.6"/>
      </svg>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>
  <main id="cards"></main>

  <footer>BREW · TIME · TASTE — 매일 한 잔</footer>
</div>

<script>
const DATA = [
  {
    id:"filip", accent:"var(--amber)",
    name:"Filip Kucharczyk", src:"2016 WAC 우승<br>폴란드 · Inverted",
    tagline:"일반의 약 2배 도즈(35g)를 굵게·저온으로 약하게 뽑은 '농축액'을 물로 희석해 농도를 맞추는 챔피언 레시피.",
    stats:[["원두","35","g"],["추출수","150","g"],["온도","84","°C"],["총 시간","~1:30",""]],
    ingredients:[
      {nm:"원두 (굵게 · 케멕스 굵기)",am:35,u:"g"},
      {nm:"추출수 (약 84°C)",am:150,u:"g"},
      {nm:"희석수 (취향껏)",am:110,u:"g"},
    ],
    steps:[
      {t:"분쇄 & 세팅",d:"케멕스 굵기로 분쇄. 종이필터를 헹구고 역방향(inverted)으로 조립한 뒤 원두를 넣고 평평하게 만든다."},
      {t:"물 붓기",d:"타이머를 시작하고 추출수 150g을 약 15초에 걸쳐 붓는다.",s:15},
      {t:"휘젓기",d:"0:35까지 충분히 저어준다 (젓가락으로 격렬하게 젓는 게 Filip의 팁).",s:20},
      {t:"침출",d:"캡을 닫고 1:00까지 기다린다.",s:25},
      {t:"뒤집어 압출",d:"1:00에 잔 위로 뒤집어 한 번 스월한 뒤, 천천히 끝까지 눌러 압출한다."},
      {t:"희석",d:"희석수를 더해 농도를 취향껏 맞춘다. 진하면 물을 더, 연하면 덜 넣는다."},
    ],
    notes:[
      "35g은 일반 대비 거의 2배 도즈. 분쇄가 굵으면 물을 적게, 가늘면 물을 많이 넣어 보정한다.",
      "물 온도는 출처마다 81~85°C로 다르지만 본인 인터뷰 기준 84°C가 기준점.",
      "Flow Control 필터캡이 있으면 정방향으로도 재현 가능 (150g → 20초 휘젓기 → 1:00 저은 뒤 1:30 압출).",
    ],
  },
  {
    id:"iced", accent:"var(--teal)",
    name:"Japanese-Inspired 아이스", src:"AeroPress 공식<br>Flash Brew · Upright",
    tagline:"가늘게 간 원두를 뜨거운 물로 진하게 추출해 얼음 위로 바로 내려 급랭. 콜드브루보다 향이 또렷하다.",
    stats:[["원두","16","g"],["뜨거운 물","150","g"],["얼음","100","g"],["총 시간","~2:30",""]],
    ingredients:[
      {nm:"원두 (가늘게)",am:16,u:"g"},
      {nm:"뜨거운 물",am:150,u:"g"},
      {nm:"얼음",am:100,u:"g"},
    ],
    steps:[
      {t:"세팅",d:"물을 끓인다. 원두를 가늘게 분쇄하고 필터를 끼워 캡을 닫는다. 잔(디캔터)에 얼음을 넣고, 정방향으로 잔 위에 올린 뒤 원두를 투입한다."},
      {t:"붓고 젓기",d:"타이머를 시작하고 뜨거운 물 150g을 부은 뒤 가볍게 저어준다."},
      {t:"침출",d:"그대로 2분간 침출한다.",s:120},
      {t:"플래시 압출",d:"얼음 위로 천천히 압출한다. 다 내려오면 가볍게 저어 남은 얼음을 녹인다 (1~2분).",s:90},
      {t:"서빙",d:"필요하면 신선한 얼음을 더하고, 향이 가장 좋을 때 바로 마신다."},
    ],
    notes:[
      "밝고 과일·꽃 향이 좋은 원두(에티오피아·케냐)가 특히 잘 어울린다.",
      "얼음은 큰 큐브일수록 천천히 녹아 농도 관리에 유리하다.",
      "정방향이라 일반 캡 사용 시, 물이 너무 빨리 새기 전에 빠르게 부어준다.",
      "출처: AeroPress 공식 블로그 'Japanese Inspired Iced Coffee'. Filip 개인 귀속은 확인되지 않음.",
    ],
  },
  {
    id:"lukas", accent:"var(--copper)",
    name:"Lukas Zahradnik", src:"2015 WAC 우승<br>슬로바키아 · Inverted",
    tagline:"79°C 저온과 부품 예열이 핵심. 케냐 워시드 원두로 깔끔하고 또렷한 산미를 내는 2단 추출.",
    stats:[["원두","20","g"],["물","230","g"],["온도","79","°C"],["총 시간","~1:30",""]],
    ingredients:[
      {nm:"원두 (에스프레소보다 약간 굵게)",am:20,u:"g"},
      {nm:"1차 물 (79°C)",am:60,u:"g"},
      {nm:"2차 물 (79°C)",am:170,u:"g"},
    ],
    steps:[
      {t:"세팅 & 예열",d:"종이필터를 헹구고, 모든 부품을 79°C 물로 15초 이상 예열한다. 역방향으로 조립한 뒤 원두를 넣는다.",s:15},
      {t:"1차 추출 & 위글",d:"1차 물 60g을 부은 뒤 15초간 좌우로 터뷸런트하게 흔든다 (turbulent wiggle).",s:15},
      {t:"블룸",d:"15초간 그대로 둔다.",s:15},
      {t:"2차 추출",d:"2차 물 170g을 약 10초에 걸쳐 부어 총 230g을 맞춘다.",s:10},
      {t:"뒤집어 압출",d:"필터캡을 닫고 잔 위로 뒤집어 45초간 천천히 압출한다 (총 약 1:30).",s:45},
    ],
    notes:[
      "케냐 등 워시드·고밀도 원두 추천. 산미가 또렷하게 살아나는 스타일.",
      "79°C 저온이라 부품 예열이 핵심. 건너뛰면 온도가 떨어져 추출이 부족해진다.",
      "변수(온도·물양·시간)는 고정하고, 맛 조절은 분쇄도만 바꿔가며 잡는 걸 권장.",
      "블룸은 재현 버전에 따라 30초까지 늘리기도 한다.",
    ],
  },
];

const fmt = n => {
  const r = Math.round(n*10)/10;
  return Number.isInteger(r) ? r.toString() : r.toFixed(1);
};

const tabsEl = document.getElementById("tabs");
const cardsEl = document.getElementById("cards");
const servings = {};

DATA.forEach((r,i)=>{
  servings[r.id] = 1;
  // tab
  const tab = document.createElement("button");
  tab.className = "tab"+(i===0?" active":"");
  tab.style.color = r.accent;
  tab.dataset.id = r.id;
  const shortName = r.id==="iced" ? "아이스" : r.name.split(" ")[0];
  tab.innerHTML = `<span class="dot"></span>${shortName}<small>${r.id==="iced"?"FLASH":"WAC "+r.src.match(/\d{4}/)[0]}</small>`;
  tab.onclick = ()=>select(r.id);
  tabsEl.appendChild(tab);

  // card
  const c = document.createElement("section");
  c.className = "card"+(i===0?" show":"");
  c.id = "card-"+r.id;
  c.style.setProperty("--accent", r.accent);
  c.innerHTML = `
    <div class="rh">
      <div class="rname">${r.name}</div>
      <div class="rsrc">${r.src}</div>
    </div>
    <p class="tagline">${r.tagline}</p>
    <div class="stats">
      ${r.stats.map(s=>`<div class="stat"><div class="k">${s[0]}</div><div class="v">${s[1]}<small>${s[2]}</small></div></div>`).join("")}
    </div>
    <div class="scaler">
      <span class="lbl">분량</span>
      <div class="stepper">
        <button aria-label="줄이기" data-act="minus" data-id="${r.id}">−</button>
        <span class="cnt" id="cnt-${r.id}">1<small>잔</small></span>
        <button aria-label="늘리기" data-act="plus" data-id="${r.id}">+</button>
      </div>
    </div>
    <div class="sechd">재료</div>
    <div id="ing-${r.id}">
      ${r.ingredients.map(g=>`<div class="ing"><span class="nm">${g.nm}</span><span class="am" data-base="${g.am}">${fmt(g.am)}<small>${g.u}</small></span></div>`).join("")}
    </div>
    <div class="sechd">브루잉</div>
    <div>
      ${r.steps.map((s,si)=>`
        <div class="step">
          <div class="num">${si+1}</div>
          <div class="scon">
            <div class="stitle">${s.t}</div>
            <div class="sdesc">${s.d}</div>
            ${s.s?timerHTML(s.s):""}
          </div>
        </div>`).join("")}
    </div>
    <ul class="notes">${r.notes.map(n=>`<li>${n}</li>`).join("")}</ul>
  `;
  cardsEl.appendChild(c);
});

function timerHTML(sec){
  const R=11, C=2*Math.PI*R;
  return `<div class="timer" data-sec="${sec}" data-c="${C.toFixed(2)}" role="button" tabindex="0">
    <svg class="ring" width="28" height="28" viewBox="0 0 28 28">
      <circle class="bg" cx="14" cy="14" r="${R}" fill="none" stroke-width="2.4"/>
      <circle class="fg" cx="14" cy="14" r="${R}" fill="none" stroke-width="2.4"
        stroke-dasharray="${C.toFixed(2)}" stroke-dashoffset="0"/>
    </svg>
    <span class="lab">${sec}초</span>
  </div>`;
}

function select(id){
  document.querySelectorAll(".tab").forEach(t=>{
    const on = t.dataset.id===id;
    t.classList.toggle("active", on);
  });
  document.querySelectorAll(".card").forEach(c=>c.classList.toggle("show", c.id==="card-"+id));
  window.scrollTo({top:0,behavior:"smooth"});
}

// scaler
cardsEl.addEventListener("click",e=>{
  const b=e.target.closest("button[data-act]");
  if(b){
    const id=b.dataset.id;
    let v=servings[id]+(b.dataset.act==="plus"?1:-1);
    v=Math.max(1,Math.min(8,v));
    servings[id]=v;
    document.getElementById("cnt-"+id).innerHTML=v+"<small>잔</small>";
    document.querySelectorAll(`#ing-${id} .am`).forEach(a=>{
      const base=parseFloat(a.dataset.base);
      const u=a.querySelector("small").textContent;
      a.innerHTML=fmt(base*v)+`<small>${u}</small>`;
    });
    return;
  }
  const tm=e.target.closest(".timer");
  if(tm) toggleTimer(tm);
});
cardsEl.addEventListener("keydown",e=>{
  if((e.key==="Enter"||e.key===" ")&&e.target.classList.contains("timer")){e.preventDefault();toggleTimer(e.target);}
});

const active = new WeakMap();
function toggleTimer(el){
  if(active.has(el)){ // cancel
    clearInterval(active.get(el).iv);
    active.delete(el);
    resetTimer(el);
    return;
  }
  const total=parseInt(el.dataset.sec,10);
  const C=parseFloat(el.dataset.c);
  const fg=el.querySelector(".fg");
  const lab=el.querySelector(".lab");
  let left=total;
  el.classList.add("run");el.classList.remove("done");
  lab.textContent=mmss(left);
  fg.style.strokeDashoffset=0;
  const start=Date.now();
  const iv=setInterval(()=>{
    const elapsed=(Date.now()-start)/1000;
    left=Math.max(0,total-elapsed);
    fg.style.strokeDashoffset=(C*(1-left/total)).toFixed(2);
    lab.textContent=mmss(Math.ceil(left));
    if(left<=0){
      clearInterval(iv);active.delete(el);
      el.classList.remove("run");el.classList.add("done");
      lab.textContent="완료 ✓";
      fg.style.strokeDashoffset=C.toFixed(2);
      if(navigator.vibrate)navigator.vibrate([90,60,90]);
      setTimeout(()=>resetTimer(el),3500);
    }
  },100);
  active.set(el,{iv});
}
function resetTimer(el){
  el.classList.remove("run","done");
  el.querySelector(".fg").style.strokeDashoffset=0;
  el.querySelector(".lab").textContent=el.dataset.sec+"초";
}
function mmss(s){const m=Math.floor(s/60),x=s%60;return m?`${m}:${String(x).padStart(2,"0")}`:`${x}초`;}
</script>
